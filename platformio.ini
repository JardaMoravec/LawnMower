; PlatformIO Project Configuration File
;
; LaskaKit ESP32-S3-DEVKit: https://github.com/LaskaKit/ESP32-S3-DEVKit
; Modul WROOM-1-N16R8 (16 MB flash, 8 MB OPI PSRAM).
; Upload i Serial monitor: USB-C konektor označený UART (CH9102F).
; Druhý USB-C (native ESP32) pro běžný vývoj nepoužívej.

[platformio]
boards_dir = boards
default_envs = laskakit-esp32-s3-devkit

[env:laskakit-esp32-s3-devkit]
platform = espressif32
board = laskakit-esp32-s3-devkit
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
lib_deps =
    adafruit/Adafruit SHT4x Library
    sparkfun/SparkFun BMI270 Arduino Library@^1.0.3
extra_scripts =
    post:scripts/fix_compile_commands.py
